<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — StockBF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e9ecef;
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .flag {
            font-size: 1.5rem;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="login-card">

        <div class="text-center mb-4">
            <div class="brand-icon">
                <i class="bi bi-box-seam-fill text-white fs-3"></i>
            </div>
            <h4 class="fw-700 mb-1">StockBF</h4>
            <p class="text-muted" style="font-size:0.85rem">
                <span class="flag">🇧🇫</span>
                Gestion de Stock — Burkina Faso
            </p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} py-2 mb-3"
             style="border-radius:10px;font-size:0.85rem">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-500" style="font-size:0.85rem">
                    <i class="bi bi-person me-1"></i>Nom d'utilisateur
                </label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label fw-500" style="font-size:0.85rem">
                    <i class="bi bi-lock me-1"></i>Mot de passe
                </label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-login text-white w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </button>
        </form>

        <hr class="my-4">

        <p class="text-center text-muted mb-0" style="font-size:0.85rem">
            Pas encore de compte ?
            <a href="{% url 'inscription' %}" class="text-primary fw-500">
                Créer un compte
            </a>
        </p>
    </div>
</body>
</html>

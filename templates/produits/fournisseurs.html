{% extends 'base.html' %}
{% block title %}{{ titre }} — StockBF{% endblock %}
{% block page_title %}{{ titre }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="table-card p-4">
            <h5 class="fw-600 mb-4">{{ titre }}</h5>
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-500">Nom *</label>
                        {{ form.nom }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500">Téléphone</label>
                        {{ form.telephone }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500">Email</label>
                        {{ form.email }}
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-500">Adresse</label>
                        {{ form.adresse }}
                    </div>
                </div>
                <div class="d-flex gap-2 justify-content-end mt-4">
                    <a href="{% url 'fournisseur_liste' %}" class="btn btn-outline-secondary">
                        Annuler
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

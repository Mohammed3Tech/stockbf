{% extends 'base.html' %}
{% block title %}{{ titre }} — StockBF{% endblock %}
{% block page_title %}{{ titre }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="table-card p-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div style="width:48px;height:48px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center">
                    <i class="bi bi-truck text-white fs-5"></i>
                </div>
                <div>
                    <h5 class="mb-0 fw-600">{{ titre }}</h5>
                    <small class="text-muted">Informations du fournisseur</small>
                </div>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-500">Nom *</label>
                        {{ form.nom }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500">Téléphone</label>
                        {{ form.telephone }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-500">Email</label>
                        {{ form.email }}
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-500">Adresse</label>
                        {{ form.adresse }}
                    </div>
                </div>
                <div class="d-flex gap-2 justify-content-end mt-4">
                    <a href="{% url 'fournisseur_liste' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i> Annuler
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}{{ titre }} — StockBF{% endblock %}
{% block page_title %}{{ titre }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="table-card p-4">
            <h5 class="fw-600 mb-4">{{ titre }}</h5>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-500">Nom *</label>
                    {{ form.nom }}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-500">Description</label>
                    {{ form.description }}
                </div>
                <div class="d-flex gap-2 justify-content-end">
                    <a href="{% url 'categorie_liste' %}" class="btn btn-outline-secondary">
                        Annuler
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
